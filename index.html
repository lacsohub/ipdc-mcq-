const LBL=['A','B','C','D'];

let cur=0, chosen=new Array(QS.length).fill(-1), mode='quiz';

function rating(s,t){
  const p=s/t;
  if(p>=0.9) return {icon:'♔',title:'Grandmaster',desc:'A truly masterful performance.'};
  if(p>=0.75) return {icon:'♕',title:'International Master',desc:'Commanding control across all positions.'};
  if(p>=0.6) return {icon:'♖',title:'Candidate Master',desc:'Strong foundations, keep sharpening your game.'};
  if(p>=0.4) return {icon:'♗',title:'Club Player',desc:'A solid start — the board rewards persistence.'};
  return {icon:'♟',title:'Beginner',desc:'Every grandmaster once stood where you stand.'};
}

  const q=QS[cur];
  const ans=chosen[cur];

    const r=rating(correct,total);

        </div>
        <div class="rating">${r.icon} &nbsp; ${r.title} &nbsp; ${r.icon}<small>${r.desc}</small></div>

        <button class="play-again" onclick="restart()">♟ &nbsp; Play Again</button>
      </div>`;
    return;
  }

    let cl='dot';
    if(i===cur) cl+=' cur';

    else if(chosen[i]!==-1) cl+=' w';
    return `<div class="${cl}" onclick="jump(${i})">${i+1}</div>`;
  }).join('');

    let cl='opt';
    if(mode==='study') cl+=i===q.a?' show-ans':'';
    else if(ans!==-1){
      if(i===q.a) cl+=' correct';
      else if(i===ans) cl+=' wrong';

  let feedback='';
  if(mode==='study'){
    feedback=`<div class="chip hint">♔ &nbsp; Correct answer: ${q.o[q.a]}</div>`;
  } else if(ans!==-1){
    feedback=ans===q.a
      ? `<div class="chip ok">♔ &nbsp; Correct — well played!</div>`
      : `<div class="chip err">♟ &nbsp; Incorrect — the right move was: ${q.o[q.a]}</div>`;
  }

  app.innerHTML=`
    <div class="crown-bar">
      <span class="crown-pieces">♔ ♕ ♖ ♗ ♘ ♙</span>
      <div class="crown-title">Integrated Personality Development</div>
      <div class="crown-sub">100 Questions &nbsp;·&nbsp; Multiple Choice</div>
    </div>
    <div class="stats-row">
      <div class="stat-cell"><div class="stat-val">${cur+1}</div><div class="stat-lbl">Question</div></div>
      <div class="stat-cell"><div class="stat-val">${correct}</div><div class="stat-lbl">Correct</div></div>
      <div class="stat-cell"><div class="stat-val">${wrong}</div><div class="stat-lbl">Wrong</div></div>
      <div class="stat-cell"><div class="stat-val">${pct}%</div><div class="stat-lbl">Progress</div></div>
    </div>
    <div class="prog-track"><div class="prog-rail"><div class="prog-fill" style="width:${pct}%"></div></div></div>
    <div class="modes">
      <button class="mode-btn ${mode==='quiz'?'on':''}" onclick="setMode('quiz')">♟ &nbsp; Quiz Mode</button>
      <button class="mode-btn ${mode==='study'?'on':''}" onclick="setMode('study')">♔ &nbsp; Study Mode</button>
    </div>
    <div class="mini-nav">${dotsHtml}</div>
    <div class="qbody">
      <div class="qcard">
        <div class="piece-bg">${PIECES[cur%12]}</div>
        <div class="q-meta">
          <div class="q-badge">${cur+1}</div>
          <div class="q-text">${q.q}</div>
        </div>
        <div class="opts">${optsHtml}</div>
        ${feedback}
      </div>
    </div>
    <div class="nav-bar">
      <button class="nbtn" onclick="go(-1)" ${cur===0?'disabled':''}>&#8592; Previous</button>
      <div class="q-pos">${cur+1} of ${total}</div>
      ${cur<total-1
        ? `<button class="nbtn primary" onclick="go(1)">Next &#8594;</button>`
        : `<button class="nbtn primary" onclick="finish()">Finish &#10003;</button>`}
    </div>`;
}

function pick(i){
  if(mode==='study'||chosen[cur]!==-1) return;
  chosen[cur]=i;
  render();
}
function go(d){cur=Math.max(0,Math.min(QS.length-1,cur+d));render();}
function jump(i){cur=i;render();}
function setMode(m){
  mode=m;
  if(m==='study') chosen=new Array(QS.length).fill(-1);
  render();
}
function finish(){
  chosen=chosen.map(v=>v===-1?-2:v);
  render();
}
function restart(){cur=0;chosen=new Array(QS.length).fill(-1);mode='quiz';render();}
render();
</script>
